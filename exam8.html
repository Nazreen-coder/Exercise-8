<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            height: 90vh;
            width: 90vw;
            background-color: palevioletred;
            position: relative;

        }

        .box {
            height: 121px;
            width: 121px;
            position: absolute;
            background-color: rgb(20, 83, 255);
            border-radius: 80px;
            right: 0;
            top: 0;
            animation: animation 3s linear infinite, animation2 1s ease-out infinite alternate;

        }

        @keyframes animation {
            from {
                right: 0;

            }

            to {

                right: 100%;
            }
        }

        @keyframes animation2 {
            from {
                top: 0;
            }

            to {
                top: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">

        </div>
    </div>

</body>

</html>
